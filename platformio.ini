[env:nodemcu]
platform        = espressif8266
board           = nodemcuv2
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0

build_flags =
    -D MQTT_MAX_PACKET_SIZE=512

# Optional environments / overrides can be appended below without
# breaking the default nodemcu target.
